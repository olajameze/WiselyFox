services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: wiselyfox
      POSTGRES_PASSWORD: wiselyfox
      POSTGRES_DB: wiselyfox
    ports:
      - "5433:5432"
    volumes:
      - wiselyfox_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wiselyfox -d wiselyfox"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  wiselyfox_postgres_data:
