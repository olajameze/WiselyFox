<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline, WiselyFox</title>
    <style>
      body {
        margin: 0;
        font-family: system-ui, sans-serif;
        background: #fffbf5;
        color: #1c1917;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 1.5rem;
        text-align: center;
      }
      main {
        max-width: 28rem;
      }
      h1 {
        color: #1746a0;
      }
      button {
        margin-top: 1rem;
        background: #1746a0;
        color: #fff;
        border: 0;
        border-radius: 999px;
        padding: 0.75rem 1.25rem;
        font-size: 1rem;
        min-height: 44px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>You are offline</h1>
      <p>WiselyFox needs a connection for sign-in, lessons, and progress sync.</p>
      <p>Your installed app will reload when you are back online.</p>
      <button type="button" onclick="location.reload()">Try again</button>
    </main>
  </body>
</html>
